<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#059669"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <!-- Cross / Plus symbol -->
  <g filter="url(#shadow)">
    <rect x="330" y="180" width="364" height="664" rx="60" fill="url(#pill)"/>
    <rect x="180" y="330" width="664" height="364" rx="60" fill="url(#pill)"/>
  </g>

  <!-- Central circle accent -->
  <circle cx="512" cy="512" r="90" fill="#10b981"/>
  <circle cx="485" cy="485" r="28" fill="#ffffff" opacity="0.6"/>
</svg>
